version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: script_api_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-script_api}
      POSTGRES_USER: ${POSTGRES_USER:-script_api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
